# Publish to PyPI when a GitHub Release is published.
#
# Uses PyPI "Trusted Publishing" (OIDC): PyPI is configured to trust this exact
# repository + workflow, so no API token or secret is stored anywhere. The user
# creates a GitHub Release (tagged e.g. v0.1.0) and this workflow builds and
# uploads the artifacts.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # A named environment is where the Trusted Publisher is authorized on PyPI.
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
